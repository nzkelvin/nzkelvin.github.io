# Site settings
title: "Kelvin Bytes"
subtitle: "Architect | IT Consultanting| AI | Power Platform | Technology"
name: "Kelvin Shen"
email: "kelvinshen@outlook.com"
description: >-
  Six one east and half dozen west
url: "https://blog.kelvinbytes.com"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  highlighter: rouge

permalink: /:year-:month-:day-:title.html

# Pagination
paginate: 10
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache
  - jekyll-remote-theme

# Search
search: true
search_full_content: true

# Author sidebar
author:
  name: "Kelvin Shen"
  avatar: "/assets/image/avatar.png"
  bio: "Solution architect by day and a family guy by night"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/nzkelvin"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/kelvinshen"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/kelvinshen"

# Comments
comments:
  provider: "disqus"
  disqus:
    shortname: "kelvinbytes"

# Analytics
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "UA-48260695-1"
    anonymize_ip: false

# Site footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/nzkelvin"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/kelvinshen"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/kelvinshen"

# Reading files
include:
  - _pages

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      comments: true
      author_profile: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - _includes_old
  - _layouts_old
  - assets/css_old
  - assets/js_old
  - assets/font_old
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
